name: 🤖 Clawbot Agent Status

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Check Agent Status
        run: |
          echo "## 🤖 Clawbot Agent System Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🟢 **System**: RUNNING" >> $GITHUB_STEP_SUMMARY
          echo "⏰ Last checked: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Active Agents:" >> $GITHUB_STEP_SUMMARY
          echo "- 🟢 Commander Agent - Running" >> $GITHUB_STEP_SUMMARY
          echo "- 🟢 Master Agent - Running" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 Website Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 News Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 Stock Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 Portfolio Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Debugger Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Tester Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Installer Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Self-Upgrade Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Alert Agent - Idle" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Activity:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Fix: stale_data" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Fix: missing_news" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Run Pre-Pull Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Update Website" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Status automatically updated every 5 minutes* 🤖" >> $GITHUB_STEP_SUMMARY

      - name: 🔄 Sync Status to Repository
        run: |
          # Update status file
          echo "🤖 Clawbot Agent Status" > status.md
          echo "======================" >> status.md
          echo "" >> status.md
          echo "🟢 System: RUNNING" >> status.md
          echo "⏰ Last updated: $(date)" >> status.md
          echo "" >> status.md
          echo "## Agents" >> status.md
          echo "- 🟢 Commander: Running" >> status.md
          echo "- 🟢 Master: Running" >> status.md
          echo "- 🟡 Website: Idle" >> status.md
          echo "- 🟡 News: Idle" >> status.md
          echo "- 🟡 Stock: Idle" >> status.md
          echo "- 🟡 Portfolio: Idle" >> status.md
          echo "- 🔴 Debugger: Idle" >> status.md
          echo "- 🔴 Tester: Idle" >> status.md
          echo "- 🔴 Installer: Idle" >> status.md
          echo "- 🔴 Self-Upgrade: Idle" >> status.md
          echo "- 🔴 Alert: Idle" >> status.md
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "🤖 Update agent status - $(date)" || echo "No changes to commit"
          git push origin main || echo "Push failed"
